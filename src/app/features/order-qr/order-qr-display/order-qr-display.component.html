<section id="qr-display-page" class="qr-page">
  <article id="qr-display-card" class="qr-card">
    <div id="qr-display-header" class="qr-header">
      <span class="qr-badge material-symbols-outlined">qr_code_2</span>
      <p class="eyebrow">Pickup QR</p>
      <h1 id="qr-display-order-id">Order #{{ orderId }}</h1>
      <p>Show this code at the cafeteria counter for a faster pickup handoff.</p>
    </div>

    <div id="qr-display-error" class="qr-frame qr-error" *ngIf="errorMessage; else qrBody">
      <span class="material-symbols-outlined">block</span>
      <span>{{ errorMessage }}</span>
    </div>

    <ng-template #qrBody>
    <div id="qr-display-frame" class="qr-frame" *ngIf="base64QRString; else loadingQr">
      <img id="qr-display-image" [src]="'data:image/png;base64,' + base64QRString" alt="Order QR code" />
    </div>
    </ng-template>

    <ng-template #loadingQr>
      <div id="qr-display-loading-state" class="qr-frame qr-loading" *ngIf="isLoading">
        <div class="spinner"></div>
        <span>Preparing QR code...</span>
      </div>
    </ng-template>
  </article>
</section>
