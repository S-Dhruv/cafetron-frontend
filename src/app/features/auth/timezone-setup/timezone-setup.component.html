<main id="timezone-setup-page" class="timezone-page">
  <section id="timezone-setup-card" class="timezone-card">
    <div class="brand-mark">
      <span class="material-symbols-outlined">public</span>
    </div>
    <p class="eyebrow">Before you continue</p>
    <h1>Select timezone</h1>
    <p class="subtitle">Pickup slots will be shown in this timezone and saved for checkout.</p>

    <div class="timezone-control">
      <label for="timezone-setup-select">Timezone</label>
      <select
        id="timezone-setup-select"
        [(ngModel)]="selectedTimeZone"
        (ngModelChange)="selectTimeZone($event)"
      >
        <option *ngFor="let timeZone of timeZoneOptions" [value]="timeZone.id">
          {{ getTimeZoneLabel(timeZone.id) }}
        </option>
      </select>
    </div>

    <div class="timezone-option-grid" role="list" aria-label="Timezone options">
      <button
        *ngFor="let timeZone of getVisibleTimeZoneOptions(); let i = index"
        id="timezone-setup-option-{{ i + 1 }}"
        class="timezone-option"
        [class.selected]="selectedTimeZone === timeZone.id"
        type="button"
        (click)="selectTimeZone(timeZone.id)"
      >
        <span>{{ timeZone.label }}</span>
        <strong>{{ timeZone.offset }}</strong>
      </button>
    </div>

    <p *ngIf="isLoading" id="timezone-setup-loading-note" class="loading-note">
      Loading more timezone options...
    </p>

    <div id="timezone-setup-error" *ngIf="errorMessage" class="error-message">
      <span class="material-symbols-outlined">error</span>
      <span>{{ errorMessage }}</span>
    </div>

    <button id="timezone-setup-continue-btn" type="button" (click)="continue()">
      <span>Continue</span>
      <span class="material-symbols-outlined">arrow_forward</span>
    </button>
  </section>
</main>
